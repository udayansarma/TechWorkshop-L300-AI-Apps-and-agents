name: Build and Deploy to Azure Container App

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v2
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        run: |
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/techworkshop-app:${{ github.sha }} ./src
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/techworkshop-app:${{ github.sha }}

      - name: Set Container App secrets
        uses: azure/cli@v2
        with:
          inlineScript: |
            az containerapp secret set \
              --name ${{ secrets.AZURE_CONTAINER_APP_NAME }} \
              --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
              --secrets \
                foundry-endpoint="${{ secrets.FOUNDRY_ENDPOINT }}" \
                gpt-endpoint="${{ secrets.GPT_ENDPOINT }}" \
                embedding-endpoint="${{ secrets.EMBEDDING_ENDPOINT }}" \
                phi-4-endpoint="${{ secrets.PHI_4_ENDPOINT }}"

      - name: Deploy to Azure Container App
        uses: azure/cli@v2
        with:
          inlineScript: |
            az containerapp update \
              --name ${{ secrets.AZURE_CONTAINER_APP_NAME }} \
              --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
              --image ${{ secrets.ACR_LOGIN_SERVER }}/techworkshop-app:${{ github.sha }} \
              --set-env-vars \
                FOUNDRY_ENDPOINT=secretref:foundry-endpoint \
                gpt_endpoint=secretref:gpt-endpoint \
                embedding_endpoint=secretref:embedding-endpoint \
                phi_4_endpoint=secretref:phi-4-endpoint